<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid vh-100">
    <div class="row h-100">

        <!-- Sidebar -->
        <div class="col-lg-3 p-0">

            <div class="h-100 d-flex flex-column">

                <!-- Logo -->
                <div class="p-5 border-bottom">
                    <h2 class="mb-0">MEDPICS</h2>
                    <small>Cannabis Medicinal e Práticas Integrativas</small>
                </div>

                <!-- Imagem / Conteúdo lateral -->
                <div class="flex-grow-1 d-flex flex-column justify-content-between p-4">

                    <div class="text-center mt-4">
                        <!-- Imagem aqui -->
                        <img
                            src="https://via.placeholder.com/300x400"
                            alt="Imagem"
                            class="img-fluid">
                    </div>

                    <div>
                        <h4 class="fw-normal">
                            A medicina humanizada e a tecnologia a favor do bem-estar.
                        </h4>
                    </div>

                </div>

            </div>

        </div>

        <!-- Conteúdo Principal -->
        <div class="col-lg-9 d-flex align-items-center justify-content-center">

            <div class="w-100" style="max-width: 720px;">

                <!-- Título -->
                <div class="mb-5">
                    <h1 class="fw-bold">
                        Entre na conta de Administrador
                    </h1>

                    <p class="text-muted">
                        Use seu e-mail e senha para acessar o sistema
                    </p>
                </div>

                <!-- Formulário -->
                <form>

                    <!-- Email -->
                    <div class="mb-4">
                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="form-control form-control-lg"
                            placeholder="seu@email.com">
                    </div>

                    <!-- Senha -->
                    <div class="mb-3">
                        <label class="form-label">
                            Senha
                        </label>

                        <input
                            type="password"
                            class="form-control form-control-lg"
                            placeholder="********">
                    </div>

                    <!-- Manter conectado -->
                    <div class="form-check mb-4">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="remember">

                        <label
                            class="form-check-label"
                            for="remember">

                            Manter conectado
                        </label>
                    </div>

                    <!-- Botão -->
                    <div class="d-grid mb-5">
                        <button
                            type="submit"
                            class="btn btn-success btn-lg">

                            Entrar
                        </button>
                    </div>

                    <!-- Esqueceu senha -->
                    <div class="text-center mb-5">
                        <a href="#" class="text-decoration-none">
                            Esqueci minha senha
                        </a>
                    </div>

                    <!-- Cadastro -->
                    <div class="text-center">
                        <small class="text-muted">
                            Ainda não tem conta?
                            <a href="#" class="text-decoration-none fw-semibold">
                                Cadastre-se
                            </a>
                        </small>
                    </div>

                </form>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
