<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Seleção de Perfil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container-fluid vh-100">
    <div class="row h-100">

        <!-- Sidebar -->
        <div class="col-md-3 bg-secondary text-white d-flex flex-column">

            <div class="p-4">
                <h3 class="mb-0">MEDPICS</h3>
                <small>Cannabis Medicinal e Práticas Integrativas</small>
            </div>

            <div class="flex-grow-1 d-flex align-items-center justify-content-center">
                <img
                    src="https://via.placeholder.com/280x450"
                    alt="Imagem"
                    class="img-fluid">
            </div>

            <div class="p-4">
                <p class="fs-4 mb-0">
                    A medicina humanizada e a tecnologia a favor do bem-estar.
                </p>
            </div>

        </div>

        <!-- Conteúdo -->
        <div class="col-md-9">

            <!-- Linha superior -->
            <div class="border-bottom py-4"></div>

            <div class="d-flex flex-column justify-content-center align-items-center h-75">

                <!-- Badge -->
                <span class="badge text-bg-light mb-4">
                    NOVO CADASTRO
                </span>

                <!-- Título -->
                <h1 class="display-6 text-center">
                    Como deseja acessar?
                </h1>

                <p class="text-muted text-center mb-5">
                    Selecione seu perfil — o acesso abrirá na próxima etapa
                </p>

                <!-- Cards -->
                <div class="row justify-content-center g-4 w-100">

    <!-- Médico -->
    <div class="col-md-3">
        <input
            type="radio"
            class="btn-check"
            name="perfil"
            id="medico"
            autocomplete="off">

        <label class="card text-center h-100 btn p-0" for="medico">
            <div class="card-body py-5">
                <div class="mb-3">
                    <i class="bi bi-heart-pulse fs-1"></i>
                </div>

                <h5>Médico</h5>

                <small class="text-muted">
                    Área médica, especialidade e prontuários de pacientes
                </small>
            </div>
        </label>
    </div>

    <!-- Terapeuta -->
    <div class="col-md-3">
        <input
            type="radio"
            class="btn-check"
            name="perfil"
            id="terapeuta"
            autocomplete="off"
            checked>

        <label class="card text-center h-100 btn border-success p-0" for="terapeuta">
            <div class="card-body py-5">
                <div class="mb-3">
                    <i class="bi bi-heart-pulse-fill fs-1 text-success"></i>
                </div>

                <h5>Terapeuta</h5>

                <small class="text-muted">
                    Área terapêutica e profissional
                </small>
            </div>
        </label>
    </div>

    <!-- Administrativo -->
    <div class="col-md-3">
        <input
            type="radio"
            class="btn-check"
            name="perfil"
            id="administrativo"
            autocomplete="off">

        <label class="card text-center h-100 btn p-0" for="administrativo">
            <div class="card-body py-5">
                <div class="mb-3">
                    <i class="bi bi-grid fs-1"></i>
                </div>

                <h5>Administrativo</h5>

                <small class="text-muted">
                    Gestão da clínica
                </small>
            </div>
        </label>
    </div>

</div>

                <!-- Botão -->
                <div class="mt-5">
                    <button class="btn btn-success px-5">
                        Continuar
                    </button>
                </div>

                <!-- Rodapé -->
                <div class="mt-5">
                    <small class="text-muted">
                        Não tenho conta
                        <a href="#" class="text-decoration-none fw-semibold">
                            → Cadastro
                        </a>
                    </small>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
