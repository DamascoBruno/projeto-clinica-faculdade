<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Terapeuta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid vh-100">
    <div class="row h-100">

        <!-- Lado Esquerdo -->
        <div class="col-md-3 bg-secondary text-white d-flex flex-column">

            <!-- Logo -->
            <div class="p-4">
                <h3 class="mb-0">MEDPICS</h3>
                <small>Cannabis Medicinal e Práticas Integrativas</small>
            </div>

            <!-- Imagem -->
            <div class="flex-grow-1 d-flex align-items-center justify-content-center">
                <img
                    src="https://via.placeholder.com/300x500"
                    alt="Folha"
                    class="img-fluid">
            </div>

            <!-- Texto -->
            <div class="p-4">
                <p class="fs-5 mb-0">
                    A medicina humanizada e a tecnologia a favor do bem-estar.
                </p>
            </div>

        </div>

        <!-- Lado Direito -->
        <div class="col-md-9 d-flex align-items-center justify-content-center">

            <div class="w-100" style="max-width: 720px;">

                <h1 class="fw-bold mb-2">
                    Entre na conta de terapeuta
                </h1>

                <p class="text-muted mb-5">
                    Use seu e-mail e senha para acessar o sistema
                </p>

                <form>

                    <div class="mb-4">
                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="form-control form-control-lg"
                            placeholder="seu@email.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Senha
                        </label>

                        <input
                            type="password"
                            class="form-control form-control-lg"
                            placeholder="********">
                    </div>

                    <div class="form-check mb-4">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="manterConectado">

                        <label
                            class="form-check-label"
                            for="manterConectado">
                            Manter conectado
                        </label>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-success btn-lg w-100">
                        Entrar
                    </button>

                </form>

                <div class="text-center mt-5">
                    <p class="text-muted">
                        Ainda não tem conta?
                        <a href="#" class="fw-semibold">
                            Cadastre-se
                        </a>
                    </p>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
