<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="introducao.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div class="row align-items-start">

            <!-- ESQUERDA -->
            <div class="col-md-6 d-flex flex-column gap-5">

                <p class="textos-1">
                    SAÚDE INTEGRATIVA · ONLINE · HUMANIZADA
                </p>

                <h1 class="textos-2">
                    Transforme sua<br>
                    relação com a <span class="destaque">saúde</span>
                </h1>

                <p class="textos-3">
                    Cannabis Medicinal e Práticas Integrativas — atendimento
                    100% online, com médicos certificados em Canabinologia e terapeutas especializados em PICS,
                    onde você estiver.
                </p>

                <div class="row g-3">

                    <div class="col">
                        <a class="btn" id="botaoIntro" href="#" role="button">
                            Conhecer Tratamentos
                        </a>
                    </div>

                </div>


            </div>

            <!-- DIREITA -->
            <div class="col-md-6">

                <div id="carouselExampleIndicators" class="carousel slide">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0"
                            class="active" aria-current="true" aria-label="Slide 1"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                            aria-label="Slide 2"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                            aria-label="Slide 3"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="veacos.png" class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="veacos.png" class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="veacos.png" class="d-block w-100" alt="...">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
