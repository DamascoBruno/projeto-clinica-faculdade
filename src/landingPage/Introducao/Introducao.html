<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<body>

    <div class="container mt-5">

        <div class="row align-items-start">

            <!-- ESQUERDA -->
            <div class="col-md-6 d-flex flex-column gap-5">

                <div class="textos">
                    SAÚDE INTEGRATICA · ONLINE · HUMANIZADA
                </div>

                <div class="textos">
                    Transforme sua relação com a saúde
                </div>

                <div class="textos">
                    Cannabis Medicinal e Práticas Integrativas — atendimento
                    100% online, com médicos certificados em Endocanabinoilogia e terapeutas especializados em PICS,
                    onde você estiver.
                </div>

                <div class="row g-3">

                    <div class="col">
                        <a class="botaoAcess" href="#" role="button">
                            Acesse sua Conta
                        </a>
                    </div>

                    <div class="col">
                        <a class="btn btn-primary w-100" href="#" role="button">
                            Conhecer Tratamentos
                        </a>
                    </div>

                </div>


            </div>

            <!-- DIREITA -->
            <div class="col-md-6">

                <div id="carouselExampleIndicators" class="carousel slide">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0"
                            class="active" aria-current="true" aria-label="Slide 1"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                            aria-label="Slide 2"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                            aria-label="Slide 3"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="veacos.png" class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="veacos.png" class="d-block w-100" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="veacos.png" class="d-block w-100" alt="...">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>

        </div>

    </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
